<!-- PANTALLA DE ERROR -->
<div id="error-screen" style="display:none;position:fixed;inset:0;background:var(--color-background-primary);z-index:8888;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:20px">
  <svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="70" cy="80" rx="48" ry="28" fill="#EDE9FE"/>
    <ellipse cx="50" cy="72" rx="24" ry="20" fill="#EDE9FE"/>
    <ellipse cx="88" cy="70" rx="20" ry="17" fill="#EDE9FE"/>
    <ellipse cx="70" cy="62" rx="26" ry="20" fill="#EDE9FE"/>
    <path d="M56 72 Q59 69 62 72" stroke="#534AB7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M76 72 Q79 69 82 72" stroke="#534AB7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M61 80 Q70 76 79 80" stroke="#534AB7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="58" cy="76" rx="2" ry="3" fill="#AFA9EC"/>
    <path d="M58 79 Q56 82 58 84" stroke="#AFA9EC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="100" y="50" font-size="18" text-anchor="middle">⭐</text>
    <text x="30" y="45" font-size="14" text-anchor="middle">✨</text>
    <text x="112" y="75" font-size="12" text-anchor="middle">💫</text>
  </svg>
  <div>
    <div style="font-size:18px;font-weight:700;font-family:var(--f);color:#1F2937;margin-bottom:8px">¡Uy, algo salió mal!</div>
    <div id="error-msg" style="font-size:14px;color:#6B7280;line-height:1.6">No pudimos cargar los ejercicios.<br>¿Tienes conexión a internet?</div>
  </div>
  <button id="error-retry-btn" onclick="errorRetry()" style="background:white;border:1.5px solid var(--purple);border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;color:var(--purple);font-family:var(--f);cursor:pointer">🔄 Intentar de nuevo</button>
  <button onclick="errorBack()" style="background:none;border:none;font-size:13px;color:#6B7280;font-family:var(--f);font-weight:700;cursor:pointer">← Volver</button>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) {
        console.log('Service Worker registrado correctamente:', reg.scope);
      })
      .catch(function(err) {
        console.warn('Service Worker no se pudo registrar — modo offline desactivado:', err);
        // No mostramos toast al usuario: es transparente para él
        // pero queda registrado en consola para el desarrollador
      });
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<!-- MODAL PIN PADRES -->
<div id="pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center">
  <div style="background:white;border-radius:20px;padding:28px 24px;width:calc(100% - 48px);max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <div style="font-family:var(--f);font-weight:900;font-size:18px;color:#1F2937;text-align:center;margin-bottom:6px">🔒 Zona de padres</div>
    <div style="font-size:13px;color:var(--gray-400);text-align:center;margin-bottom:20px">Introduce el PIN para acceder</div>
    <div style="display:flex;justify-content:center;gap:10px;margin-bottom:20px">
      <div id="pin-dot-0" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
      <div id="pin-dot-1" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
      <div id="pin-dot-2" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
      <div id="pin-dot-3" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
    </div>
    <div id="pin-error" style="display:none;font-size:12px;color:#DC2626;text-align:center;margin-bottom:10px;font-weight:700">PIN incorrecto</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key pin-del" onclick="pinDel()">⌫</button>
    </div>
    <button onclick="pinCancel()" style="width:100%;padding:10px;border:none;background:none;font-size:13px;color:var(--gray-400);font-family:var(--f);font-weight:700;cursor:pointer">Cancelar</button>
  </div>
</div>
