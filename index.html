<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) {
        console.log('Service Worker registrado correctamente:', reg.scope);
      })
      .catch(function(err) {
        console.warn('Service Worker no se pudo registrar — modo offline desactivado:', err);
        // No mostramos toast al usuario: es transparente para él
        // pero queda registrado en consola para el desarrollador
      });
  }
</script>
