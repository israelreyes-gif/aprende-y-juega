<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aprende y Juega">
  <meta name="theme-color" content="#7C3AED">
  <meta name="description" content="App educativa para niños de primaria: Matemáticas, Lengua, Sciences y más. Aprende jugando con ejercicios adaptados a tu nivel.">
  <link rel="manifest" href="manifest.json">
  <title>Aprende y Juega 🎒</title>

  <link rel="stylesheet" href="css/components.css?v=1779211864">

</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/avatar.js"></script>
<script src="js/perfiles.js"></script>
<script src="js/sciences.js"></script>
<script src="js/english.js"></script>
<script src="js/padres.js"></script>
<script src="js/descripciones.js"></script>
<script src="js/medals.js"></script>
<script src="js/navigation.js"></script>
<script src="js/ui.js"></script>
<script src="js/mates.js"></script>
<script src="js/lengua.js"></script>
<script src="js/comprension.js"></script>
<script src="js/sociales.js"></script>
<script src="js/dictado.js"></script>
<script src="js/calendario.js"></script>
<script src="js/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) {
        console.log('Service Worker registrado correctamente:', reg.scope);
      })
      .catch(function(err) {
        console.warn('Service Worker no se pudo registrar — modo offline desactivado:', err);
        // No mostramos toast al usuario: es transparente para él
        // pero queda registrado en consola para el desarrollador
      });
  }
</script>
<!-- MODAL PIN PADRES -->
<div id="pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center">
  <div style="background:white;border-radius:20px;padding:28px 24px;width:calc(100% - 48px);max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <div style="font-family:var(--f);font-weight:900;font-size:18px;color:#1F2937;text-align:center;margin-bottom:6px">🔒 Zona de padres</div>
    <div style="font-size:13px;color:var(--gray-400);text-align:center;margin-bottom:20px">Introduce el PIN para acceder</div>
    <div style="display:flex;justify-content:center;gap:10px;margin-bottom:20px">
      <div id="pin-dot-0" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
      <div id="pin-dot-1" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
      <div id="pin-dot-2" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
      <div id="pin-dot-3" style="width:14px;height:14px;border-radius:50%;background:#E5E7EB;transition:background .2s"></div>
    </div>
    <div id="pin-error" style="display:none;font-size:12px;color:#DC2626;text-align:center;margin-bottom:10px;font-weight:700">PIN incorrecto</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key pin-del" onclick="pinDel()">⌫</button>
    </div>
    <button onclick="pinCancel()" style="width:100%;padding:10px;border:none;background:none;font-size:13px;color:var(--gray-400);font-family:var(--f);font-weight:700;cursor:pointer">Cancelar</button>
  </div>
</div>
</body>
</html>
