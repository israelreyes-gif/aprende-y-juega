<!-- PANTALLA DESCRIPCIONES -->
<div class="screen" id="s-descripciones">
  <div class="topbar bg-pink">
    <button class="back-btn" onclick="go('s-lengua-exercises')">←</button>
    <h1>Descripciones</h1>
    <span id="desc-pts-badge" style="background:rgba(255,255,255,.2);color:white;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px">⭐ +0</span>
  </div>
  <div class="sa">
    <!-- Contador -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin:0 16px 12px">
      <span style="font-size:12px;font-weight:700;color:var(--gray-400);font-family:var(--f)" id="desc-counter">Descripción 1 de 30</span>
    </div>

    <!-- Imagen -->
    <div style="margin:0 16px 12px;border-radius:14px;overflow:hidden;border:0.5px solid var(--gray-200)">
      <img id="desc-img" src="" alt="Imagen a describir" style="width:100%;height:180px;object-fit:cover;display:block"/>
      <div style="padding:8px 12px;background:var(--gray-100);display:flex;align-items:center;gap:6px">
        <span style="font-size:14px" id="desc-img-emoji">🖼️</span>
        <span style="font-size:12px;font-weight:700;color:var(--gray-600);font-family:var(--f)" id="desc-img-titulo">Cargando...</span>
      </div>
    </div>

    <!-- Consigna -->
    <div style="margin:0 16px 12px;background:var(--gray-100);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--gray-500);font-family:var(--f);line-height:1.5">
      <strong style="color:var(--gray-700)">¿Qué ves en esta imagen?</strong> Escribe al menos 3 oraciones describiendo lo que hay, los colores y cómo te hace sentir.
    </div>

    <!-- Textarea -->
    <div style="margin:0 16px 12px">
      <textarea
        id="desc-textarea"
        rows="6"
        placeholder="Escribe aquí tu descripción..."
        style="width:100%;border:1.5px solid var(--gray-200);border-radius:12px;padding:12px;font-size:14px;font-family:var(--f);resize:none;background:var(--gray-50);color:var(--gray-800);line-height:1.6;outline:none"
        oninput="updateDescCharCount()"
      ></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:4px">
        <span style="font-size:11px;color:var(--gray-400);font-family:var(--f)" id="desc-char-count">0 caracteres</span>
      </div>
    </div>

    <!-- Botón enviar -->
    <div style="margin:0 16px 12px">
      <button class="next-btn bg-pink" onclick="enviarDescripcion()">Enviar descripción ✓</button>
    </div>

    <!-- Feedback (oculto hasta enviar) -->
    <div id="desc-feedback" style="display:none;margin:0 16px 20px">
      <!-- Se rellena dinámicamente -->
    </div>

    <!-- Botón siguiente (oculto hasta enviar) -->
    <div style="margin:0 16px 20px;display:none" id="desc-next-wrap">
      <button class="next-btn bg-pink" onclick="siguienteDescripcion()">Siguiente imagen →</button>
    </div>

  </div>
</div>
